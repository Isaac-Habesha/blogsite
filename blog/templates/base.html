<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Blog Site{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto max-w-6xl px-4 py-6 sm:px-6 lg:px-8">
    <header class="flex flex-col gap-4 rounded-3xl border border-white/10 bg-white/5 px-6 py-5 shadow-2xl shadow-black/20 backdrop-blur md:flex-row md:items-center md:justify-between">
      <div>
        <p class="text-sm uppercase tracking-[0.3em] text-emerald-300/80">Journal</p>
        <h1 class="mt-1 text-2xl font-bold tracking-tight text-white">
          <a href="{% url 'blog_index' %}">My Blog</a>
        </h1>
      </div>

      <nav class="flex flex-wrap items-center gap-3">
        <a href="{% url 'blog_index' %}" class="rounded-full px-4 py-2 text-sm font-medium text-slate-200 transition hover:bg-white/10 hover:text-white">
          Home
        </a>

        {% if user.is_authenticated %}
          <a href="{% url 'blog_create' %}" class="rounded-full bg-emerald-400 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-emerald-300">
            Create a blog
          </a>
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="rounded-full border border-white/15 px-4 py-2 text-sm font-medium text-slate-200 transition hover:bg-white/10 hover:text-white">
              Logout
            </button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="rounded-full bg-emerald-400 px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-emerald-300">
            Login
          </a>
        {% endif %}
      </nav>
    </header>

    <main class="py-8">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
