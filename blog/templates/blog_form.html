{% extends 'base.html' %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
	<div class="mx-auto max-w-2xl rounded-3xl border border-white/10 bg-white/5 p-8 shadow-xl shadow-black/20 backdrop-blur">
		<h2 class="text-3xl font-bold tracking-tight text-white">{{ page_title }}</h2>
		<p class="mt-2 text-sm text-slate-400">Fill in the fields and save your post.</p>

		<form method="post" class="mt-8 space-y-5">
			{% csrf_token %}
			<div class="space-y-2">
				<label class="block text-sm font-medium text-slate-200">Title</label>
				{{ form.title }}
			</div>
			<div class="space-y-2">
				<label class="block text-sm font-medium text-slate-200">Content</label>
				{{ form.content }}
			</div>
			<div class="flex items-center gap-3 text-slate-200">
				{{ form.isPublished }}
				<label class="text-sm font-medium">Published</label>
			</div>
			<button type="submit" class="rounded-full bg-emerald-400 px-5 py-3 text-sm font-semibold text-slate-950 transition hover:bg-emerald-300">Save</button>
		</form>
	</div>
{% endblock %}
