{% extends 'base.html' %}

{% block title %}{{ blog.title }}{% endblock %}

{% block content %}
  <article class="rounded-3xl border border-white/10 bg-white/5 p-8 shadow-xl shadow-black/20 backdrop-blur">
    <p class="text-sm uppercase tracking-[0.3em] text-emerald-300/80">Blog detail</p>
    <h2 class="mt-3 text-4xl font-bold tracking-tight text-white">{{ blog.title }}</h2>
    <p class="mt-6 whitespace-pre-line text-lg leading-8 text-slate-300">{{ blog.content }}</p>

    <div class="mt-8 flex flex-wrap items-center gap-3">
      <span class="rounded-full border border-emerald-400/30 px-4 py-2 text-sm font-medium text-emerald-300">
        {% if blog.isPublished %}Published{% else %}Draft{% endif %}
      </span>

      {% if user.is_authenticated %}
        <a href="{% url 'blog_edit' blog.pk %}" class="rounded-full bg-white px-4 py-2 text-sm font-semibold text-slate-950 transition hover:bg-slate-200">
          Edit
        </a>
        <a href="{% url 'blog_delete' blog.pk %}" class="rounded-full border border-rose-400/30 px-4 py-2 text-sm font-semibold text-rose-300 transition hover:bg-rose-400/10">
          Delete
        </a>
      {% endif %}
    </div>
  </article>
{% endblock %}
