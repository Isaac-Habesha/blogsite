{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md rounded-3xl border border-white/10 bg-white/5 p-8 shadow-xl shadow-black/20 backdrop-blur">
    <h2 class="text-3xl font-bold tracking-tight text-white">Login</h2>
    <p class="mt-2 text-sm text-slate-400">Sign in to create, edit, or delete blogs.</p>

    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="rounded-full bg-emerald-400 px-5 py-3 text-sm font-semibold text-slate-950 transition hover:bg-emerald-300">
        Login
      </button>
    </form>
  </div>
{% endblock %}
