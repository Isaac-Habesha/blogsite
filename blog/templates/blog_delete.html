{% extends 'base.html' %}

{% block title %}Delete Blog{% endblock %}

{% block content %}
	<div class="mx-auto max-w-2xl rounded-3xl border border-rose-400/20 bg-rose-500/10 p-8 shadow-xl shadow-black/20 backdrop-blur">
		<p class="text-sm uppercase tracking-[0.3em] text-rose-200/80">Delete confirmation</p>
		<h2 class="mt-3 text-3xl font-bold tracking-tight text-white">Delete Blog</h2>
		<p class="mt-4 text-slate-200">Are you sure you want to delete "{{ blog.title }}"?</p>
		<form method="post" class="mt-8 flex flex-wrap gap-3">
			{% csrf_token %}
			<button type="submit" class="rounded-full bg-rose-400 px-5 py-3 text-sm font-semibold text-white transition hover:bg-rose-300">Yes, delete</button>
			<a href="{% url 'blog_detail' blog.pk %}" class="rounded-full border border-white/15 px-5 py-3 text-sm font-semibold text-slate-100 transition hover:bg-white/10">Cancel</a>
		</form>
	</div>
{% endblock %}
